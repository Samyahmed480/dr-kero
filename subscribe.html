<!DOCTYPE html>
<html lang="ar">

    <head>
        <link rel="stylesheet" href="style.css">
        <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>الاشتراك - منصة سشات</title>
        <script src="js/auth.js"></script>
    </head>

    <body>
        <nav>
            <div class="container">
                <div class="logo">
                    <img src="logo.jpg" alt="سشات" width="48" height="48">
                    <span>سشات</span>
                </div>
                <a href="index.html">الرئيسية</a>
                <a href="contact.html">اتصل بنا</a>
            </div>
        </nav>

        <main>
            <div class="card glow" style="max-width: 400px; margin: 2rem auto; padding: 2rem;">
                <h2>تسجيل الدخول</h2>
                <form id="loginForm" onsubmit="event.preventDefault(); validateForm();">
                    <div style="margin-bottom: 1rem;">
                        <label style="display: block; margin-bottom: 0.5rem;">كود الاشتراك:</label>
                        <input type="text" id="accessCode"
                            style="width: 100%; padding: 0.5rem; border-radius: 4px; border: 1px solid #333; background: #222; color: white;">
                    </div>
                    <button type="submit"
                        style="width: 100%; padding: 0.5rem; background: #20b6ff; border: none; border-radius: 4px; color: white; cursor: pointer;">دخول</button>
                    <p id="errorMessage" style="color: red; margin-top: 1rem; display: none;">كود غير صحيح</p>
                </form>
            </div>
        </main>

        <script>
            function validateForm() {
                const code = document.getElementById('accessCode').value;
                const errorMessage = document.getElementById('errorMessage');

                if (handleLogin(code)) {
                    window.location.href = document.referrer || 'index.html';
                } else {
                    errorMessage.style.display = 'block';
                }
            }
        </script>
    </body>

</html>
